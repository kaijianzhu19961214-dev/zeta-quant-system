name: ${COMPOSE_PROJECT_NAME:-quant_system}

services:
  postgres:
    image: postgres:16-alpine
    container_name: quant_system_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-quant_system}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - quant_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quant_backend

  redis:
    image: redis:7-alpine
    container_name: quant_system_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - quant_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - quant_backend

  quant_data_hub:
    build:
      context: .
      dockerfile: services/quant_data_hub/Dockerfile
    container_name: quant_system_quant_data_hub
    restart: unless-stopped
    environment:
      APP_NAME: quant-data-hub
      APP_ENV: ${APP_ENV:-development}
      CLICKHOUSE_HTTP_URL: ${CLICKHOUSE_HTTP_URL:-http://host.docker.internal:18123}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-quant_market}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-quant}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${QUANT_DATA_HUB_PORT:-18000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quant_backend

networks:
  quant_backend:
    name: quant_system_backend

volumes:
  quant_postgres_data:
    name: quant_system_postgres_data
  quant_redis_data:
    name: quant_system_redis_data
