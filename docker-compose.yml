name: ${COMPOSE_PROJECT_NAME:-quant_system}

services:
  postgres:
    image: postgres:16-alpine
    container_name: quant_system_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-quant_system}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - quant_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quant_backend

  redis:
    image: redis:7-alpine
    container_name: quant_system_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - quant_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - quant_backend

  quant_data_hub:
    build:
      context: .
      dockerfile: services/quant_data_hub/Dockerfile
    container_name: quant_system_quant_data_hub
    restart: unless-stopped
    environment:
      APP_NAME: quant-data-hub
      APP_ENV: ${APP_ENV:-development}
      CLICKHOUSE_HTTP_URL: ${CLICKHOUSE_HTTP_URL:-http://host.docker.internal:18123}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-quant_market}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-quant}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${QUANT_DATA_HUB_PORT:-18000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quant_backend

  quant_factor_lab:
    build:
      context: .
      dockerfile: services/quant_factor_lab/Dockerfile
    container_name: quant_system_quant_factor_lab
    restart: unless-stopped
    environment:
      APP_NAME: quant-factor-lab
      APP_ENV: ${APP_ENV:-development}
      QUANT_DATA_HUB_BASE_URL: ${QUANT_DATA_HUB_BASE_URL:-http://quant_data_hub:8000}
      QUANT_DATA_API_TOKEN: ${QUANT_DATA_API_TOKEN:-}
      QUANT_DATA_HUB_TIMEOUT_SECONDS: ${QUANT_DATA_HUB_TIMEOUT_SECONDS:-15}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${QUANT_FACTOR_LAB_PORT:-18010}:8000"
    depends_on:
      quant_data_hub:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quant_backend

  quant_factor_validation:
    build:
      context: .
      dockerfile: services/quant_factor_validation/Dockerfile
    container_name: quant_system_quant_factor_validation
    restart: unless-stopped
    environment:
      APP_NAME: quant-factor-validation
      APP_ENV: ${APP_ENV:-development}
      QUANT_DATA_HUB_BASE_URL: ${QUANT_DATA_HUB_BASE_URL:-http://quant_data_hub:8000}
      QUANT_DATA_API_TOKEN: ${QUANT_DATA_API_TOKEN:-}
      QUANT_DATA_HUB_TIMEOUT_SECONDS: ${QUANT_DATA_HUB_TIMEOUT_SECONDS:-15}
      VALIDATION_PERSISTENCE_ENABLED: ${VALIDATION_PERSISTENCE_ENABLED:-false}
      VALIDATION_DATABASE_URL: ${VALIDATION_DATABASE_URL:-postgresql+asyncpg://quant_admin:quant_local_password@postgres:5432/quant_factor_validation}
      VALIDATION_DATABASE_ECHO: ${VALIDATION_DATABASE_ECHO:-false}
      VALIDATION_OBJECT_STORE_ENDPOINT: ${VALIDATION_OBJECT_STORE_ENDPOINT:-}
      VALIDATION_OBJECT_STORE_ACCESS_KEY: ${VALIDATION_OBJECT_STORE_ACCESS_KEY:-}
      VALIDATION_OBJECT_STORE_SECRET_KEY: ${VALIDATION_OBJECT_STORE_SECRET_KEY:-}
      VALIDATION_OBJECT_STORE_BUCKET: ${VALIDATION_OBJECT_STORE_BUCKET:-quant-factor-data}
      VALIDATION_OBJECT_STORE_SECURE: ${VALIDATION_OBJECT_STORE_SECURE:-false}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${QUANT_FACTOR_VALIDATION_PORT:-18020}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      quant_data_hub:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quant_backend

  quant_ops_api:
    build:
      context: .
      dockerfile: services/quant_ops_api/Dockerfile
    container_name: quant_system_quant_ops_api
    restart: unless-stopped
    environment:
      APP_NAME: quant-ops-api
      APP_ENV: ${APP_ENV:-development}
      QUANT_DATA_HUB_BASE_URL: ${QUANT_DATA_HUB_BASE_URL:-http://quant_data_hub:8000}
      QUANT_FACTOR_LAB_BASE_URL: ${QUANT_FACTOR_LAB_BASE_URL:-http://quant_factor_lab:8000}
      QUANT_FACTOR_VALIDATION_BASE_URL: ${QUANT_FACTOR_VALIDATION_BASE_URL:-http://quant_factor_validation:8000}
      SERVICE_HEALTH_TIMEOUT_SECONDS: ${SERVICE_HEALTH_TIMEOUT_SECONDS:-5}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${QUANT_OPS_API_PORT:-18030}:8000"
    depends_on:
      quant_data_hub:
        condition: service_healthy
      quant_factor_lab:
        condition: service_healthy
      quant_factor_validation:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quant_backend

  quant_ops_web:
    build:
      context: .
      dockerfile: apps/quant_ops_web/Dockerfile
    container_name: quant_system_quant_ops_web
    restart: unless-stopped
    environment:
      QUANT_OPS_API_INTERNAL_URL: ${QUANT_OPS_API_INTERNAL_URL:-http://quant_ops_api:8000}
      VITE_QUANT_OPS_API_BASE_PATH: ${VITE_QUANT_OPS_API_BASE_PATH:-/ops-api}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${QUANT_OPS_WEB_PORT:-18040}:5173"
    depends_on:
      quant_ops_api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - quant_backend

networks:
  quant_backend:
    name: quant_system_backend

volumes:
  quant_postgres_data:
    name: quant_system_postgres_data
  quant_redis_data:
    name: quant_system_redis_data
