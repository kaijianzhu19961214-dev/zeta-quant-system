[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "quant-contracts"
version = "0.1.0"
description = "Shared schemas and contracts for Zeta Quant System"
requires-python = ">=3.12,<3.13"
dependencies = [
  "pydantic>=2.0,<3.0",
]

[tool.setuptools.packages.find]
where = ["src"]
